<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
<div class="card shadow p-4">
    <h2 class="mb-4 text-primary">Thêm nhân viên mới</h2>
    <form th:action="@{/employees/add}" th:object="${employee}" method="post" enctype="multipart/form-data">

        <div class="mb-3">
            <label class="form-label">Họ tên:</label>
            <input type="text" th:field="*{name}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Tuổi:</label>
            <input type="number" th:field="*{age}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Phòng ban:</label>
            <select th:field="*{department}" class="form-select" required>
                <option value="">-- Chọn phòng ban --</option>
                <option th:each="dept : ${departments}"
                        th:value="${dept.id}"
                        th:text="${dept.name}"></option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Ảnh đại diện:</label>
            <input type="file" name="file" class="form-control" accept="image/*">
        </div>

        <div class="mb-3">
            <div class="form-check">
                <input type="checkbox" th:field="*{status}" class="form-check-input" id="status">
                <label class="form-check-label" for="status">Đang làm việc</label>
            </div>
        </div>

        <button type="submit" class="btn btn-success">Lưu nhân viên</button>
        <a href="/employees" class="btn btn-secondary">Quay lại</a>
    </form>
</div>
</body>
</html>
