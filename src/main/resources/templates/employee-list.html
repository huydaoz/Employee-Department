<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <h2 class="text-center mb-4">DANH SÁCH NHÂN VIÊN</h2>
    <table class="table table-hover shadow bg-white">
        <thead class="table-primary">
        <tr>
            <th>ID</th>
            <th>Họ Tên</th>
            <th>Tuổi</th>
            <th>Phòng Ban</th>
            <th>Địa điểm</th>
            <th>Trạng thái</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="emp : ${list}">
            <td th:text="${emp.id}"></td>
            <td th:text="${emp.name}"></td>
            <td th:text="${emp.age}"></td>
            <!-- Truy cập dữ liệu của bảng liên kết -->
            <td th:text="${emp.department.name}"></td>
            <td th:text="${emp.department.location}"></td>
            <td>
                        <span th:class="${emp.status ? 'badge bg-success' : 'badge bg-danger'}"
                              th:text="${emp.status ? 'Hoạt động' : 'Nghỉ việc'}"></span>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
